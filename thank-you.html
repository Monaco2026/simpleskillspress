<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You - SimpleSkillsPress</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lottie -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <style>
    :root {
      --brand-primary: #4f46e5;
      --brand-primary-hover: #4338ca;
      --text: #111827;
      --muted: #6b7280;
      --bg: #f9fafb;
      --card: #ffffff;
      --success: #16a34a;
      --radius: 16px;
      --font: "Inter", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.06);
      animation: fadeUp 0.5s ease-out;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .check {
      width: 96px;
      height: 96px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(22, 163, 74, 0.08);
    }

    h1 {
      font-size: 26px;
      margin: 0 0 10px;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 15.5px;
      line-height: 1.6;
      color: var(--muted);
      margin: 0 0 26px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 600;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--brand-primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--brand-primary-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: var(--text);
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 13px;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 22px;
      }
    }
  </style>
</head>

<body>
  <div class="card">

    <!-- Luxury minimal Lottie success -->
    <div class="check">
      <lottie-player
        src="https://assets10.lottiefiles.com/packages/lf20_jbrw3hcz.json"
        background="transparent"
        speed="0.8"
        style="width: 96px; height: 96px;"
        autoplay>
      </lottie-player>
    </div>

    <h1>Thank you for reaching out!</h1>

    <p>
      We’ve received your message and will get back to you shortly.<br />
      In the meantime, feel free to explore SimpleSkillsPress.
    </p>

    <div class="actions">
      <a href="https://www.simpleskillspress.com" class="btn btn-primary">
        Back to Home
      </a>

      <a href="https://www.simpleskillspress.com/courses" class="btn btn-secondary">
        Browse Courses
      </a>
    </div>

    <div class="footer-note">
      Usually responds within 24–48 hours
    </div>

  </div>
</body>
</html>
