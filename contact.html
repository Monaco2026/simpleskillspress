<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<style>
    .blue-line {
    width: 16cm;
    height: 0.15cm;
    background: rgb(59, 101, 175);
    margin: 0 auto 80px auto;
    border-radius: 4px;
}
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #111;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 50px;
}

.logo {
    width: 260px;
    height: auto;
}

/* TEXT STYLE */
h1{
    font-weight: normal;
}
h4{
    font-weight: bold;
}

p {
    line-height: 1.6;
}
.contact {
    text-align: center;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 20px auto 0 auto;
    max-width: 380px;
}
input,
textarea {
    font-family: Arial, sans-serif;
    font-size: 14px;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    color: #111;
}

textarea {
    min-height: 80px;
    resize: vertical;
}

/* BUTTON */
button {
    display: inline-block;
    padding: 11px 20px;
    background: transparent;
    color: rgb(59, 101, 175);
    border: 1px solid rgb(59, 101, 175);
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.1s ease;
}

button:hover {
    background: rgb(59, 101, 175);
    color: white;
}
</style>

</head>

<body>

<div class="container">

    <header class="header">
        <img src="newlogo.jpg" class="logo" alt="Logo">
    </header>
<div class="blue-line"></div>

    <section class="contact">
        <h4>Contact Us</h4>

        <p>We look forward to hearing from you.</p>

        <form action="https://api.web3forms.com/submit" method="POST" autocomplete="off">

            <input type="hidden" name="access_key" value="7148baee-ed04-487d-951b-37a0592af3e2">

            <input type="text" name="name" placeholder="Your Name" required>

            <input type="email" name="email" placeholder="Your Email" required>

            <textarea name="message" placeholder="Your Message" required></textarea>

            <button type="submit">Send</button>

        </form>
    </section>

</div>

</body>
</html>
